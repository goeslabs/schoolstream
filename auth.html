<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SchoolStream | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="auth-brand">School<span>Stream</span></div>
      <h1>Welcome Back</h1>
      <p class="auth-sub">Sign in to manage school events and family calendar updates.</p>

      <div class="auth-tabs" role="tablist" aria-label="Authentication tabs">
        <button type="button" class="auth-tab active" id="loginTab" onclick="switchAuthView('login')">Login</button>
        <button type="button" class="auth-tab" id="registerTab" onclick="switchAuthView('register')">Register</button>
      </div>

      <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
        <div class="field-row">
          <div class="field-label">Email</div>
          <input class="field-input" id="loginEmail" type="email" autocomplete="email" required>
        </div>
        <div class="field-row">
          <div class="field-label">Password</div>
          <input class="field-input" id="loginPassword" type="password" autocomplete="current-password" required>
        </div>
        <div id="loginMessage" class="auth-message" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <form id="registerForm" class="auth-form" style="display:none;" onsubmit="handleRegister(event)">
        <div class="field-row">
          <div class="field-label">Email</div>
          <input class="field-input" id="registerEmail" type="email" autocomplete="email" required>
        </div>
        <div class="field-row">
          <div class="field-label">Password</div>
          <input class="field-input" id="registerPassword" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="field-row">
          <div class="field-label">Confirm Password</div>
          <input class="field-input" id="registerPasswordConfirm" type="password" autocomplete="new-password" minlength="8" required>
        </div>
        <div id="registerMessage" class="auth-message" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=2"></script>
  <script src="js/auth.js"></script>
</body>
</html>
